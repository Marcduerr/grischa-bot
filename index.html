<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grischa Mechanik AG – Digitaler Assistent</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#e8eaed;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}

/* ===== FARBEN ===== */
/* Primär Dunkelblau: #1a2e4a | Akzent Türkis: #2ABFBF */

/* ===== CHAT CONTAINER ===== */
#chat{width:460px;max-height:760px;height:90vh;background:#fff;border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,0.18);display:flex;flex-direction:column;overflow:hidden}

/* ===== HEADER ===== */
#header{background:#1a2e4a;padding:0;display:flex;flex-direction:column;flex-shrink:0}
#header-main{display:flex;align-items:center;gap:14px;padding:14px 18px}
#header img.logo{height:32px;width:auto;object-fit:contain;flex-shrink:0;filter:brightness(0) invert(1)}
.hinfo{flex:1;min-width:0}
.hname{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.2px}
.hstatus{font-size:11px;color:rgba(255,255,255,0.65);display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#header-bar{background:#2ABFBF;height:3px;width:100%}

/* ===== MESSAGES ===== */
#messages{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;background:#f5f6f8;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

/* ===== MESSAGE BUBBLES ===== */
.msg{display:flex;gap:9px;max-width:92%;animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.bubble{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.bot .bubble{background:#fff;border:1px solid #e2e4e8;border-radius:3px 16px 16px 16px;color:#1a1a2e;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.user .bubble{background:#1a2e4a;color:#fff;border-radius:16px 3px 16px 16px}
.mav{width:30px;height:30px;background:#2ABFBF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;letter-spacing:0.5px}

/* ===== WELCOME CARD ===== */
.welcome-card{background:#fff;border:1px solid #e2e4e8;border-radius:3px 16px 16px 16px;padding:14px 16px;font-size:13.5px;color:#1a1a2e;box-shadow:0 1px 4px rgba(0,0,0,0.07);line-height:1.6}
.welcome-card .wc-title{font-size:15px;font-weight:700;color:#1a2e4a;margin-bottom:10px}
.welcome-card ul{list-style:none;margin:0 0 12px 0;padding:0;display:flex;flex-direction:column;gap:5px}
.welcome-card ul li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#333}
.welcome-card ul li::before{content:'✓';color:#2ABFBF;font-weight:700;font-size:12px;margin-top:1px;flex-shrink:0}
.welcome-card .wc-upload{background:#f0f8f8;border:1.5px dashed #2ABFBF;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;transition:background 0.15s}
.welcome-card .wc-upload:hover{background:#e0f4f4}
.welcome-card .wc-upload .icon{font-size:20px;flex-shrink:0}
.welcome-card .wc-upload .text strong{display:block;font-size:13px;font-weight:600;color:#1a2e4a}
.welcome-card .wc-upload .text span{font-size:11px;color:#666}
.welcome-card .wc-footer{font-size:13px;color:#555;font-weight:500}

/* ===== EXAMPLE CHIPS ===== */
.example-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:6px;border:1px solid #dde1e8;background:#f8f9fb;color:#1a2e4a;cursor:pointer;transition:all 0.15s;line-height:1.3}
.chip:hover{background:#1a2e4a;color:#fff;border-color:#1a2e4a}

/* ===== FILE BUBBLE ===== */
.file-msg{background:#fff;border:1px solid #e2e4e8;border-radius:3px 16px 16px 16px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.file-msg .fi{width:34px;height:34px;background:#f0f8f8;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#1a2e4a}
.file-msg .fn{font-weight:600;font-size:13px;color:#1a2e4a}
.file-msg .fs{font-size:11px;color:#888;margin-top:2px}

/* ===== TYPING ===== */
.typing{display:flex;gap:5px;padding:12px 15px;align-items:center}
.typing span{width:7px;height:7px;background:#bbb;border-radius:50%;animation:bounce 1.3s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ===== QUICK ACTIONS ===== */
#qr{padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.qb{font-size:11.5px;padding:6px 11px;border-radius:6px;border:1.5px solid #1a2e4a;background:#fff;color:#1a2e4a;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-weight:600}
.qb:hover{background:#1a2e4a;color:#fff}
.qb.accent{border-color:#2ABFBF;color:#2ABFBF}
.qb.accent:hover{background:#2ABFBF;color:#fff}

/* ===== TOOLBAR ===== */
#toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px 0;background:#fff;border-top:1px solid #f0f0f0;flex-shrink:0}
#file-input{display:none}
#file-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;border:1.5px solid #1a2e4a;background:#fff;color:#1a2e4a;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;flex-shrink:0}
#file-btn:hover{background:#1a2e4a;color:#fff}
#file-preview{flex:1;font-size:12px;color:#2ABFBF;font-weight:500;display:none;align-items:center;gap:6px;overflow:hidden}
#file-preview span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#file-clear{background:none;border:none;color:#999;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1}

/* ===== INPUT ROW ===== */
#input-row{display:flex;gap:8px;padding:10px 14px 14px;background:#fff;flex-shrink:0}
#inp{flex:1;padding:10px 14px;border-radius:8px;border:1.5px solid #dde1e8;font-size:13.5px;font-family:inherit;background:#f8f9fb;transition:border 0.15s;color:#1a1a2e}
#inp:focus{outline:none;border-color:#2ABFBF;background:#fff}
#btn{width:40px;height:40px;border-radius:8px;border:none;background:#1a2e4a;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
#btn:hover{background:#2ABFBF}
#btn:disabled{opacity:0.35;cursor:not-allowed}

/* ===== FOOTER ===== */
#footer{font-size:10.5px;color:#bbb;text-align:center;padding:0 0 10px;background:#fff;letter-spacing:0.2px;flex-shrink:0}
</style>
</head>
<body>
<div id="chat">

  <div id="header">
    <div id="header-main">
      <img class="logo" src="https://grischamechanik.ch/wp-content/uploads/2018/05/grischamechanik_logo.png" alt="Grischa Mechanik" onerror="this.style.display='none'"/>
      <div class="hinfo">
        <div class="hname">Grischa Mechanik AG</div>
        <div class="hstatus"><span class="dot"></span>Digitaler Assistent · Online</div>
      </div>
    </div>
    <div id="header-bar"></div>
  </div>

  <div id="messages"></div>

  <div id="qr">
    <button class="qb accent" onclick="sendQ('Ich möchte eine Offerte anfragen')">Offerte anfragen</button>
    <button class="qb" onclick="sendQ('Ist dieses Mass auf Ihrer Maschine fertigbar?')">Machbarkeit prüfen</button>
    <button class="qb" onclick="sendQ('Welche Toleranzen können Sie einhalten?')">Toleranzen</button>
    <button class="qb" onclick="sendQ('Wie lange ist die Lieferzeit?')">Lieferzeit</button>
    <button class="qb" onclick="sendQ('Welche Materialien verarbeiten Sie?')">Materialien</button>
    <button class="qb" onclick="sendQ('Können Sie Serien und Prototypen fertigen?')">Serie / Prototyp</button>
  </div>

  <div id="toolbar">
    <input type="file" id="file-input" accept=".pdf,.step,.stp,.dxf,.dwg,.png,.jpg,.jpeg" onchange="fileSelected()"/>
    <button id="file-btn" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      Datei anhängen
    </button>
    <div id="file-preview">
      <span id="file-name"></span>
      <button id="file-clear" onclick="clearFile()">×</button>
    </div>
  </div>

  <div id="input-row">
    <input type="text" id="inp" placeholder="Ihre Anfrage..." onkeydown="if(event.key==='Enter')send()"/>
    <button id="btn" onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div id="footer">Grischa Mechanik AG · Landquart · grischamechanik.ch</div>

</div>

<script>
const SYSTEM = `Du bist der digitale Verkaufs- und Technikassistent der Grischa Mechanik AG in Landquart, Graubünden, Schweiz. Du verhältst dich wie ein erfahrener technischer Sachbearbeiter. Professionell, präzise, hilfsbereit. Kein Markdown, keine Sternchen, keine Fettschrift-Marker. Nur sauberer Fliesstext mit Zeilenumbrüchen.

ÜBER GRISCHA MECHANIK AG:
- Standort: Riedlöserstrasse 9, CH-7302 Landquart
- Mitarbeitende: ca. 50 Personen, über 30 Jahre Erfahrung
- Telefon: +41 81 322 85 85 | E-Mail: info@grischamechanik.ch
- Öffnungszeiten: Mo-Fr 07:00-17:00 Uhr
- Kunden: Maschinenindustrie In-/Ausland, KMUs, Grossbetriebe, Engineeringfirmen
- Qualität: 0-Fehler-Strategie, Vier-Augen-Prinzip, Messprotokolle auf Wunsch

FERTIGUNGSVERFAHREN:
1. FRÄSEN: Max. 4000x2800x1500mm. 5-Achs und 3-Achs. DN Solution DVF5000 (2023, 32-Paletten-Automation), AXA VPC U (3400x2200x1100mm), Kao Ming KMC-4000 (4000x2800mm), Quaser MV-184/154 mit Pick&Place Roboter.
2. DREHEN: Hartdrehen, ab Stange, Futter-, Karussell-, Vertikaldrehen. Neu: Muratec MT200, Puma 3100.
3. ERODIEREN: Draht- und Senkerodieren (seit 2025 intern).
4. SCHLEIFEN: Erstklassige Oberflächengüte, exakte Parallelitäten.
5. SCHWEISSEN: MIG/MAG/TIG, bis 1000kg.
6. MESSEN: Modernste Messtechnik, Messprotokolle auf Wunsch.
7. LASERN: Trotec Speedmarker 700.
8. 3D DRUCK: ProJET MJP 2500 für Prototypen.
9. MONTAGE: Einbaufertige Baugruppen inkl. Hydraulik, Pneumatik, Elektronik.

MATERIALIEN: Automatenstähle, CrNi-Stähle (1.4404, 1.4301), Aluminium (EN AW-7075, 6061, 5083), Buntmetalle, Guss, Sonderqualitäten.

VERHALTEN:
- Immer auf Deutsch. Wenn Kunde in anderer Sprache schreibt, in dieser Sprache antworten.
- Kein Markdown. Keine Sternchen. Keine Fettschrift-Marker wie **Text**. Nur normaler Text.
- Professionell aber persönlich. Kurze, präzise Antworten.
- Keine Preisangaben. Immer Offerte empfehlen.
- Bei konkreten Anfragen: strukturiert nachfragen (Material, Masse, Stückzahl, Toleranzen, Liefertermin).
- Stelle maximal 2-3 Fragen gleichzeitig.
- Wenn Kunde ernsthaftes Interesse zeigt: Name, Firma, E-Mail erfragen.
- Harteloxierung: extern vergeben, koordinieren wir.
- Was du nicht weisst: ehrlich sagen, an info@grischamechanik.ch verweisen.`;

const msgs = [];
let busy = false;
let selectedFile = null;

window.onload = () => {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  const av = document.createElement('div');
  av.className = 'mav'; av.textContent = 'GM'; wrap.appendChild(av);
  const card = document.createElement('div');
  card.className = 'welcome-card';
  card.innerHTML = `
    <div class="wc-title">Schnell zur passenden Fertigungslösung</div>
    <ul>
      <li>Fertigungsmöglichkeiten und Machbarkeit prüfen</li>
      <li>Offerten schneller vorbereiten</li>
      <li>Materialien und Verfahren finden</li>
      <li>Technische Fragen zu Fräsen, Drehen, Erodieren</li>
    </ul>
    <div class="wc-upload" onclick="document.getElementById('file-input').click()">
      <div class="icon">📐</div>
      <div class="text">
        <strong>Zeichnung oder STEP-Datei hochladen</strong>
        <span>PDF, STEP, DXF — für Machbarkeitsprüfung oder Offerte</span>
      </div>
    </div>
    <div class="wc-footer">Wie kann ich Sie unterstützen?</div>
    <div class="example-chips">
      <span class="chip" onclick="sendQ('Können Sie Aluminium EN AW-7075 mit Toleranz H7 fräsen?')">Alu 7075 / H7 Passung</span>
      <span class="chip" onclick="sendQ('Welche maximale Bauteilgrösse können Sie fräsen?')">Max. Bauteilgrösse</span>
      <span class="chip" onclick="sendQ('Ich benötige 50 Frästeile kurzfristig — was ist die früheste Lieferzeit?')">Kurzfristige Lieferung</span>
      <span class="chip" onclick="sendQ('Können Sie Prototypen und anschliessend Serienteile fertigen?')">Prototyp zu Serie</span>
    </div>`;
  wrap.appendChild(card);
  document.getElementById('messages').appendChild(wrap);
};

function fileSelected() {
  const f = document.getElementById('file-input').files[0];
  if (!f) return;
  selectedFile = f;
  document.getElementById('file-name').textContent = f.name;
  document.getElementById('file-preview').style.display = 'flex';
}

function clearFile() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-preview').style.display = 'none';
}

function addMsg(role, text) {
  msgs.push({ role, content: text });
  const w = document.createElement('div');
  w.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  if (role === 'assistant') {
    const a = document.createElement('div');
    a.className = 'mav'; a.textContent = 'GM'; w.appendChild(a);
  }
  const b = document.createElement('div');
  b.className = 'bubble'; b.textContent = text; w.appendChild(b);
  document.getElementById('messages').appendChild(w);
  document.getElementById('messages').scrollTop = 99999;
}

function addFileMsg(filename, size) {
  const w = document.createElement('div');
  w.className = 'msg bot';
  const a = document.createElement('div');
  a.className = 'mav'; a.textContent = 'GM'; w.appendChild(a);
  const b = document.createElement('div');
  b.className = 'file-msg';
  const ext = filename.split('.').pop().toUpperCase();
  const icon = ext === 'PDF' ? '📄' : (ext === 'STEP' || ext === 'STP') ? '⚙️' : '📐';
  b.innerHTML = `<div class="fi">${icon}</div><div><div class="fn">${filename}</div><div class="fs">${(size/1024).toFixed(1)} KB · Erhalten</div></div>`;
  w.appendChild(b);
  document.getElementById('messages').appendChild(w);
  document.getElementById('messages').scrollTop = 99999;
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'msg bot'; w.id = 'typing';
  const a = document.createElement('div');
  a.className = 'mav'; a.textContent = 'GM'; w.appendChild(a);
  const b = document.createElement('div');
  b.className = 'bubble typing';
  b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(b);
  document.getElementById('messages').appendChild(w);
  document.getElementById('messages').scrollTop = 99999;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  let text = inp.value.trim();
  if (!text && !selectedFile) return;
  inp.value = '';

  let userMsg = text;
  if (selectedFile) {
    addFileMsg(selectedFile.name, selectedFile.size);
    userMsg = text
      ? `${text}\n\n[Datei hochgeladen: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)]`
      : `[Datei hochgeladen: ${selectedFile.name}] Bitte prüfen Sie die Machbarkeit.`;
    clearFile();
  }
  if (userMsg) addMsg('user', userMsg);

  busy = true;
  document.getElementById('btn').disabled = true;
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: SYSTEM,
        messages: msgs.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }))
      })
    });
    const json = await response.json();
    removeTyping();
    const reply = json.content && json.content[0] && json.content[0].text
      ? json.content[0].text
      : 'Bitte kontaktieren Sie uns direkt: +41 81 322 85 85';
    addMsg('assistant', reply);
  } catch(e) {
    removeTyping();
    addMsg('assistant', 'Verbindungsfehler. Bitte kontaktieren Sie uns: +41 81 322 85 85');
  }
  busy = false;
  document.getElementById('btn').disabled = false;
}

function sendQ(t) {
  document.getElementById('inp').value = t;
  send();
}
</script>
</body>
</html>
